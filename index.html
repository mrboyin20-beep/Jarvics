<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI - Phone Control</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .arc-reactor { width: 180px; height: 180px; border: 4px solid #00f2ff; border-radius: 50%; box-shadow: 0 0 50px #00f2ff, inset 0 0 50px #00f2ff; display: flex; align-items: center; justify-content: center; animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .status { margin-top: 20px; font-size: 1rem; text-align: center; width: 80%; text-shadow: 0 0 10px #00f2ff; min-height: 50px; }
        button { margin-top: 30px; padding: 15px 40px; background: transparent; border: 2px solid #00f2ff; color: #00f2ff; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 0 15px #00f2ff; }
        button:active { transform: scale(0.95); background: #00f2ff; color: #000; }
    </style>
</head>
<body>

    <div class="arc-reactor">
        <div style="width: 130px; height: 130px; border: 2px dashed #00f2ff; border-radius: 50%;"></div>
    </div>
    
    <div class="status" id="status">JARVIS SYSTEM ONLINE</div>
    <button onclick="startJarvis()">ACTIVATE JARVIS</button>

    <script>
        const API_KEY = "AIzaSyBjcZ3vZ72xwnlT6UrWA-W2xrkI2YfcNos"; 
        const statusText = document.getElementById('status');
        let track; // Flashlight track variable

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-IN';

        function startJarvis() {
            recognition.start();
            statusText.innerText = "Listening...";
        }

        recognition.onresult = async (event) => {
            const command = event.results[0][0].transcript.toLowerCase();
            statusText.innerText = "You: " + command;
            
            // Step 1: Check for Phone Control Commands
            if (command.includes("flashlight on") || command.includes("light on")) {
                controlFlashlight(true);
            } else if (command.includes("flashlight off") || command.includes("light off")) {
                controlFlashlight(false);
            } else if (command.includes("open youtube")) {
                speak("Opening YouTube, sir.");
                window.open("https://www.youtube.com", "_blank");
            } else {
                // Step 2: If not a command, ask Gemini
                await askGemini(command);
            }
        };

        async function controlFlashlight(state) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                track = stream.getVideoTracks()[0];
                await track.applyConstraints({ advanced: [{ torch: state }] });
                speak(state ? "Flashlight turned on." : "Flashlight turned off.");
                if (!state) track.stop(); 
                statusText.innerText = "Jarvis: Done, sir.";
            } catch (e) {
                statusText.innerText = "Error: Camera access denied.";
                speak("I cannot access the flashlight, sir.");
            }
        }

        async function askGemini(prompt) {
            statusText.innerText = "Thinking...";
            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await resp.json();
                const reply = data.candidates[0].content.parts[0].text;
                statusText.innerText = "Jarvis: " + reply;
                speak(reply);
            } catch (e) {
                statusText.innerText = "Error connecting to AI...";
            }
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            synth.speak(utter);
        }
    </script>
</body>
</html>
